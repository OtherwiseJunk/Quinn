server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Route all requests to index.html for Vue Router to handle
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the server container
    location /api/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
